version: 2
updates:
  # Maintain dependencies for npm (Next.js, Node.js)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Maintain dependencies for Python (FastAPI/ML)
  - package-ecosystem: "pip"
    directory: "/ml_service" # Assuming this is where requirements.txt or Pipfile is, adjust if needed.
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Maintain GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
